name: Deploy Production Admin Service

on:
  workflow_dispatch:
    inputs:
      image_sha:
        description: "Immutable 40-character image tag to deploy"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-admin-production
  cancel-in-progress: false

env:
  DEPLOY_ENVIRONMENT: production
  REGION: europe-west1
  SERVICE: aestheticlab-calendar-telegram
  ADMIN_SERVICE: aestheticlab-calendar-telegram-admin
  STATE_COLLECTION_PREFIX: calendar_telegram
  RENEWAL_LEAD_MINUTES: "1440"
  DELIVERY_TTL_DAYS: "30"
  TELEGRAM_TOKEN_SECRET_NAME: TELEGRAM_TOKEN
  CALENDAR_IDS_SECRET_NAME: CALENDAR_IDS
  SCHEDULER_JOB: aestheticlab-calendar-telegram-renew
  SCHEDULER_SERVICE_ACCOUNT_ID: calendar-telegram-renewer
  IMAGE_TAG: ${{ inputs.image_sha }}

jobs:
  checks:
    uses: ./.github/workflows/_checks.yml

  deploy-admin:
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT }}
      RUNTIME_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      GCP_WORKLOAD_ID_PROVIDER: ${{ secrets.GCP_WORKLOAD_ID_PROVIDER }}
      GCP_SERVICE_ACCOUNT_GITHUB: ${{ secrets.GCP_SERVICE_ACCOUNT_GITHUB }}
      DOCKER_IMAGE: ${{ secrets.DOCKER_IMAGE }}
      REQUIRE_DOCKER_LOGIN: "false"
      VERIFY_PUBLIC_SERVICE: "false"
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      NOTIFICATION_CHANNELS: ${{ secrets.GCP_MONITORING_NOTIFICATION_CHANNELS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate deployment inputs
        run: scripts/validate-devops-env.sh

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_ID_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT_GITHUB }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate Google Cloud deployment inputs
        run: scripts/validate-gcp-deploy-inputs.sh

      - name: Deploy admin service
        run: |
          gcloud run deploy "${ADMIN_SERVICE}" \
            --image "${DOCKER_IMAGE}:${IMAGE_TAG}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --quiet \
            --no-allow-unauthenticated \
            --service-account "${RUNTIME_SERVICE_ACCOUNT}" \
            --min-instances=0 \
            --concurrency=1 \
            --command uvicorn \
            --args src.admin_main:app,--host,0.0.0.0,--port,8080 \
            --set-env-vars "^|^TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}|WEBHOOK_URL=${WEBHOOK_URL}|STATE_COLLECTION_PREFIX=${STATE_COLLECTION_PREFIX}|GOOGLE_CLOUD_PROJECT=${PROJECT_ID}|GCP_PROJECT=${PROJECT_ID}|RENEWAL_LEAD_MINUTES=${RENEWAL_LEAD_MINUTES}|DELIVERY_TTL_DAYS=${DELIVERY_TTL_DAYS}" \
            --set-secrets "CALENDAR_IDS=${CALENDAR_IDS_SECRET_NAME}:latest,TELEGRAM_TOKEN=${TELEGRAM_TOKEN_SECRET_NAME}:latest"

      - name: Configure renewal scheduler
        run: scripts/configure-renewal-scheduler.sh

      - name: Configure Firestore TTL
        run: scripts/configure-firestore-ttl.sh

      - name: Configure alert policies
        run: scripts/configure-alerts.sh

      - name: Verify Cloud Run deployment
        run: scripts/verify-cloud-run-deploy.sh
