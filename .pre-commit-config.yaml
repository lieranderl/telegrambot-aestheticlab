default_install_hook_types:
  - pre-commit
  - pre-push

fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: unit-tests
        name: unit tests
        entry: uv run python -m unittest discover -s tests
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: dependency-audit
        name: dependency security audit
        entry: scripts/audit-dependencies.sh
        language: system
        pass_filenames: false
        stages: [pre-push]
